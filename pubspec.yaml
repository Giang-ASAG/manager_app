name: manager
description: Sales Management Flutter App (MVVM)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 🧠 State management & DI (MVVM)
  provider: ^6.1.5
  get_it: ^9.2.0

  # 📝 Model Helpers
  json_annotation: ^4.9.0 # Bổ sung cái này

  # 🌐 Networking & Routing
  dio: ^5.9.0
  go_router: ^16.0.0
  flutter_dotenv: ^6.0.0

  # 📊 UI & Animations
  fl_chart: ^1.0.0
  rflutter_alert: ^2.0.7
  loading_animation_widget: ^1.3.0

  # 🌍 Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # 💾 Storage
  shared_preferences: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 🔥 Chuyển 2 cái này xuống đây để tối ưu dung lượng APK
  build_runner: ^2.5.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env